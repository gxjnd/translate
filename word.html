<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
        
    <title>词汇通 - 智能分类增强版</title>
    <style>
        :root { --primary: #4a90e2; --success: #2ecc71; --danger: #e74c3c; --bg: #f5f7fa; }
        body { font-family: 'Segoe UI', system-ui; background: var(--bg); display: flex; justify-content: center; padding-top: 50px; }
        .container { background: white; padding: 2rem; border-radius: 20px; box-shadow: 0 10px 30px rgba(0,0,0,0.1); width: 420px; text-align: center; }
        
        /* 进度条 */
        .progress-group { margin-bottom: 20px; }
        .bar-bg { height: 8px; background: #eee; border-radius: 4px; overflow: hidden; margin-top: 5px; }
        #progress-bar { height: 100%; background: var(--primary); width: 0%; transition: 0.3s; }

        /* 单词卡片动画 */
        .word-card { 
            margin: 20px 0; min-height: 140px; border: 2px solid #f0f0f0; 
            border-radius: 15px; padding: 20px; position: relative;
            transition: transform 0.3s, opacity 0.3s;
        }
        #word-display { font-size: 2.6rem; margin: 0; color: #2c3e50; }
        #definition-display { color: #7f8c8d; margin-top: 15px; display: none; font-size: 0.95rem; }

        /* 交互按钮 */
        button { border: none; border-radius: 12px; cursor: pointer; font-weight: bold; transition: 0.2s; }
        button:active { transform: scale(0.95); }
        .btn-show { background: var(--primary); color: white; width: 100%; padding: 12px; margin-bottom: 10px; }
        .actions { display: flex; gap: 10px; }
        .btn-master { background: var(--success); color: white; flex: 1; padding: 15px; }
        .btn-unknown { background: var(--danger); color: white; flex: 1; padding: 15px; }
        
        /* 导出工具 */
        .export-section { margin-top: 25px; border-top: 1px solid #eee; padding-top: 20px; display: flex; gap: 8px; }
        .btn-copy { background: #f8f9fa; color: #666; border: 1px solid #ddd; flex: 1; padding: 8px; font-size: 0.75rem; }
        
        #toast { position: fixed; bottom: 30px; background: rgba(0,0,0,0.8); color: white; padding: 10px 20px; border-radius: 30px; display: none; }

.div_upload {
position: absolute;
top:20px;
right:10px;

cursor: pointer;
border: none;

width: 32px;
height: 32px;
margin-left: 4px;
flex: 0 0 35px; 
border-radius: 8px;
border: 2px solid transparent;
background: #333;
display: flex;
align-items: center;
justify-content: center;
/* 动画过渡 */
-webkit-tap-highlight-color: transparent;

}

#fileInput{
display:none;
}




    </style>
</head>
<body>

<div class="container">
    <div class="progress-group">
        <div style="display:flex; justify-content: space-between; font-size: 0.8rem; color: #888;">
            <span>已标记: <b id="done-count">0</b> / <span id="total-count">0</span></span>
            <span id="percent">0%</span>
        </div>
        <div class="bar-bg"><div id="progress-bar"></div></div>
    </div>

    <div id="learning-area">
        <div class="word-card" id="card">
            <h1 id="word-display">Ready?</h1>
            <p id="definition-display"></p>
        </div>
        <button class="btn-show" onclick="toggleDef()">查看释义 (Space)</button>
        <div class="actions">
            <button class="btn-unknown" onclick="handleChoice('unfamiliar')">不熟悉 (A)</button>
            <button class="btn-master" onclick="handleChoice('mastered')">掌握 (D)</button>
        </div>
    </div>

    <div class="export-section">
        <button class="btn-copy" onclick="copyData('mastered')">复制掌握名单</button>
        <button class="btn-copy" onclick="copyData('unfamiliar')">复制不熟悉名单</button>
        <button class="btn-copy" style="background:#333; color:white" onclick="reset()">重置</button>
    </div>
</div>

<div id="toast"></div>


<script>
// html-tag-js@1.1.41 - 可读版（单个函数 + 扩展）
function tag(element, props = {}) {
// 如果第二个参数是字符串，自动转为 innerHTML
if (typeof props === "string") {
props = { innerHTML: props };
}

// 支持函数组件（高级用法）
if (typeof element === "function") {
return element(props, arguments[2]);
}

// 如果传入已有 DOM 节点，直接返回
if (element instanceof Node) {
return element;
}

// 必须是字符串标签名
if (typeof element !== "string") {
throw new Error(`Invalid tag: ${typeof element}`);
}

const el = document.createElement(element);

// 处理属性
Object.keys(props).forEach(key => {
let value = props[key];
if (value === undefined) return;

switch (key) {
case "child":
appendChild(el, value);
break;

case "children":
if (!Array.isArray(value)) {
throw new Error("children must be an array of Nodes");
}
value.flat().forEach(child => appendChild(el, child));
break;

case "attr":
Object.keys(value).forEach(attrKey => {
const attrVal = value[attrKey];
if (attrVal !== undefined) el.setAttribute(attrKey, attrVal);
});
break;

case "style":
case "dataset":
Object.keys(value).forEach(subKey => {
const subVal = value[subKey];
if (subVal !== undefined) el[key][subKey] = subVal;
});
break;

case "ref":
if (value && value.instanceOfRef) value.el = el;
break;

default:
el[key] = value;
}
});

return el;
}

// 辅助函数：追加子节点（支持字符串自动转文本）
function appendChild(parent, child) {
if (!(child instanceof Node)) {
child = document.createTextNode(String(child));
}
// 支持响应式文本节点（tag.use）的 clone
if (child instanceof Text && typeof child.clone === "function") {
child = child.clone();
}
parent.append(child);
}

// === 内置扩展方法（与官方完全一致）===
Object.defineProperties(tag, {
get: {
value: selector => document.querySelector(selector)
},
getAll: {
value: selector => Array.from(document.querySelectorAll(selector))
},
parse: {
value: html => {
const div = document.createElement("div");
div.innerHTML = html;
return div.childElementCount === 1
? div.firstElementChild
: Array.from(div.children);
}
},
text: {
value: str => document.createTextNode(str)
},
use: {
value: (initial = "") => {
let value = initial;
let isCloned = false;
const node = document.createTextNode(initial);
const clones = [node];

Object.defineProperty(node, "value", {
set: v => {
value = v;
clones.forEach(c => (c.textContent = v));
},
get: () => value
});

Object.defineProperty(node, "clone", {
value: () => {
if (!isCloned) {
isCloned = true;
return node;
}
const clone = node.cloneNode();
clones.push(clone);
return clone;
}
});

return node;
}
}
});

// 自动全局暴露（浏览器环境）
if (typeof window !== "undefined" && !window.tag) {
window.tag = tag;
}
</script>

<script>

const div_upload_ele = tag('button', {

/* ---------- 工具函数 ---------- */
const $ = s => document.querySelector(s);
const $$ = s => document.querySelectorAll(s);

//---------------------------------------------------------------------------------
    // 1. 原始文本（你提供的格式）
    var rawStr = `


    `;
    
    if(localStorage.getItem("rawStrz")){
      rawStr=localStorage.getItem("rawStrz")
    }
    
var allWords = [];
var mastered = [];
var unfamiliar = [];

function init(){
      // 2. 解析器：转为字典对象
     allWords = rawStr.trim().split('\n').map(line => {
        const m = line.trim().match(/^([a-zA-Z]+)\s+(.*?)\s*<\s*>$/);
        return m ? { w: m[1], d: m[2] } : null;
    }).filter(x => x);

    // 3. 状态管理
     mastered = JSON.parse(localStorage.getItem('lex_mastered')) || [];
     unfamiliar = JSON.parse(localStorage.getItem('lex_unfamiliar')) || [];

  
}    
    // 找出还没操作过的词
    function getRemaining() {
        return allWords.filter(item => !mastered.includes(item.w) && !unfamiliar.includes(item.w));
    }

    // 4. 核心渲染函数
    function render() {
      
        const remaining = getRemaining();
        const total = allWords.length;
        const done = mastered.length + unfamiliar.length;

        document.getElementById('total-count').innerText = total;
        document.getElementById('done-count').innerText = done;
        const progress = (done / total * 100).toFixed(0);
        document.getElementById('progress-bar').style.width = progress + '%';
        document.getElementById('percent').innerText = progress + '%';

        if (remaining.length === 0) {
            document.getElementById('word-display').innerText = "核心词汇已过完！";
            document.getElementById('definition-display').innerText = "你可以点击下方按钮导出你的词库。";
            document.getElementById('definition-display').style.display = 'block';
            return;
        }

        const current = remaining[0];
        document.getElementById('word-display').innerText = current.w;
        document.getElementById('definition-display').innerText = current.d;
        document.getElementById('definition-display').style.display = 'none';
    }

    // 5. 存储与“下一个”逻辑
    function handleChoice(type) {
        const currentWord = getRemaining()[0];
        if (!currentWord) return;

        // 动画反馈
        const card = document.getElementById('card');
        card.style.opacity = '0';
        card.style.transform = type === 'mastered' ? 'translateX(50px)' : 'translateX(-50px)';

        setTimeout(() => {
            if (type === 'mastered') {
                mastered.push(currentWord.w);
                localStorage.setItem('lex_mastered', JSON.stringify(mastered));
            } else {
                unfamiliar.push(currentWord.w);
                localStorage.setItem('lex_unfamiliar', JSON.stringify(unfamiliar));
            }

            render();
            card.style.opacity = '1';
            card.style.transform = 'translateX(0)';
        }, 300);
    }

    function toggleDef() {
        const d = document.getElementById('definition-display');
        d.style.display = d.style.display === 'none' ? 'block' : 'none';
    }

    // 6. 强大的复制逻辑
    function copyData(type) {
        const list = type === 'mastered' ? mastered : unfamiliar;
        if (list.length === 0) return showToast("该列表暂无单词");

        const text = allWords
            .filter(item => list.includes(item.w))
            .map(item => `${item.w} ${item.d} <  >`)
            .join('\n');

        navigator.clipboard.writeText(text).then(() => {
            showToast(`已复制 ${list.length} 个${type === 'mastered' ? '掌握' : '不熟悉'}单词`);
        });
    }

    function showToast(msg) {
        const t = document.getElementById('toast');
        t.innerText = msg; t.style.display = 'block';
        setTimeout(() => t.style.display = 'none', 2000);
    }

    function reset() {
        if(confirm("确定清空所有记录吗？")) {
            localStorage.clear();
            mastered = [];
            unfamiliar = [];
            allWords = [];
            
            render();
        }
    }


   init()
    render();
