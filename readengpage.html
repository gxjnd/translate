





<!DOCTYPE html>
<html lang="zh-TW">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="viewport"
    content="width=device-width,initial-scale=1.0,maximum-scale=1.0,minimum-scale=1.0,user-scalable=no">

   
    <title>段落閱讀器</title>
    <style>
        body {
            font-family: "Microsoft JhengHei", "Segoe UI", sans-serif;
            margin: 0;
            padding: 0;
            background: #f5f5f5;
            display: flex;
            justify-content: center;
        }
        .container {
            width: 100%;
            max-width: 800px;
            background: white;
            box-shadow: 0 0 15px rgba(0,0,0,0.1);
            min-height: 100vh;
        }
        .header {
            background: #2c3e50;
            color: white;
            padding: 15px 20px;
            display: flex;
            flex-wrap: wrap;
            gap: 10px;
            align-items: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        button {
            padding: 10px 16px;
            font-size: 16px;
            border: none;
            border-radius: 6px;
            cursor: pointer;
            transition: all 0.2s;
        }
        button:hover {
            transform: translateY(-2px);
        }
        .btn-prev { background: #3498db; color: white; }
        .btn-next { background: #3498db; color: white; }
        .btn-copy { background: #27ae60; color: white; }
        .btn-paste { background: #f39c12; color: white; }
        .btn-full { background: #9b59b6; color: white; }

        .content {
            padding: 40px 30px;
            min-height: 60vh;
            font-size: 18px;
            line-height: 1.8;
            color: #333;
        }
        .paragraph {
            white-space: pre-wrap;
        }
        .info {
            padding: 10px 20px;
            background: #ecf0f1;
            font-size: 14px;
            color: #666;
            display: flex;
            justify-content: space-between;
        }
        textarea {
            width: 100%;
            height: 200px;
            padding: 15px;
            border: 1px solid #ddd;
            font-size: 16px;
            font-family: inherit;
            resize: vertical;
        }
        .footer {
            padding: 15px 20px;
            background: #34495e;
            color: white;
            text-align: center;
            font-size: 14px;
        }
        #input-text{
          width:90%;
        }
    </style>
</head>
<body>
    <div class="container">
        <!-- 頂部按鈕區 -->
        <div class="header">
            <button class="btn-prev" onclick="prevParagraph()">back</button>
            <button class="btn-next" onclick="nextParagraph()">next</button>
            <button class="btn-copy" onclick="copyCurrent()">copy</button>
            <button class="btn-paste" onclick="pasteToInput()">paste</button>
      
            <span style="margin-left: auto; color: #bdc3c7;">
                第 <span id="current-num">1</span> / <span id="total-num">0</span> 段
            </span>
        </div>

        <!-- 文字顯示區 -->
        <div class="content" id="content">
            <div class="paragraph" id="current-paragraph">
                請先在下方輸入文字，並以 #### 分隔段落
            </div>
        </div>

        <!-- 資訊欄 -->
        <div class="info">
            <span>目前顯示第 <strong id="info-current">1</strong> 段</span>
            <span>總段落數: <strong id="info-total">0</strong></span>
        </div>

        <!-- 輸入區 -->
        <div style="padding: 20px;">
            <h3>輸入文字（使用 #### 分隔段落）</h3>
            <textarea id="input-text" placeholder="在此輸入文字，每段之間用 #### 分隔..."></textarea>
            <div style="margin-top: 10px;">
                <button onclick="loadText()" style="background:#2980b9;color:white;">載入文字並開始閱讀</button>
                <button onclick="clearAll()" style="background:#e74c3c;color:white;">清除全部</button>
            </div>
        </div>

        <div class="footer">
            段落閱讀器 • 按鈕版 • 使用 #### 作為段落分隔符
        </div>
    </div>

    <script>
        let paragraphs = [];
        let currentIndex = 0;

        function splitText(text) {
            return text.split(/--------------------------------------------------------------------------------- \s*/).map(p => p.trim()).filter(p => p.length > 0);
        }

        function loadText() {
            const input = document.getElementById('input-text').value;
            if (!input.trim()) {
                alert('請輸入文字');
                return;
            }
            paragraphs = splitText(input);
            currentIndex = 0;
            renderCurrent();
        }

        function renderCurrent() {
            if (paragraphs.length === 0) return;
            
            document.getElementById('current-paragraph').innerHTML = 
                paragraphs[currentIndex].replace(/\n/g, '<br><br>');
            
            document.getElementById('current-num').textContent = currentIndex + 1;
            document.getElementById('total-num').textContent = paragraphs.length;
            document.getElementById('info-current').textContent = currentIndex + 1;
            document.getElementById('info-total').textContent = paragraphs.length;
        }

        function prevParagraph() {
            if (paragraphs.length === 0) return;
            currentIndex = (currentIndex - 1 + paragraphs.length) % paragraphs.length;
            renderCurrent();
        }

        function nextParagraph() {
            if (paragraphs.length === 0) return;
            currentIndex = (currentIndex + 1) % paragraphs.length;
            renderCurrent();
        }

        function copyCurrent() {
            if (paragraphs.length === 0) return;
            const text = paragraphs[currentIndex];
           // alert(text)
            navigator.clipboard.writeText(text).then(() => {
                const orig = event.target.textContent;
                event.target.textContent = '已複製！';
                setTimeout(() => {
                    event.target.textContent = orig;
                }, 1500);
            });
        }

        function pasteToInput() {
            navigator.clipboard.readText().then(text => {
                document.getElementById('input-text').value = text;
            }).catch(() => {
                alert('無法讀取剪貼簿');
            });
        }

        function clearAll() {
            if (confirm('確定要清除全部內容嗎？')) {
                document.getElementById('input-text').value = '';
                paragraphs = [];
                currentIndex = 0;
                document.getElementById('current-paragraph').innerHTML = 
                    '請先在下方輸入文字，並以 #### 分隔段落';
                document.getElementById('current-num').textContent = '1';
                document.getElementById('total-num').textContent = '0';
            }
        }

        function showFullHTML() {
            const html = document.documentElement.outerHTML;
            const newWin = window.open('', '_blank');
            newWin.document.write('<pre>' + html.replace(/</g, '&lt;').replace(/>/g, '&gt;') + '</pre>');
            newWin.document.close();
        }

        // 鍵盤快捷鍵
        document.addEventListener('keydown', function(e) {
            if (e.key === "ArrowRight") nextParagraph();
            if (e.key === "ArrowLeft") prevParagraph();
        });

        // 範例文字
        window.onload = function() {
            const example = `這是第一段文字的內容。\n\n這裡可以有很多內容。####\n\n這是第二段，使用####分隔。\n\n可以有很多行。####\n\n第三段內容...`;
            document.getElementById('input-text').value = example;
            loadText();
        };
    </script>
</body>
</html>
