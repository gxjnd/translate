 // find . abour 800 word get_pat_pos(),then replace_pos ()add <br>
  function nthIndex(str, pat, n){
  var L= str.length, i= -1;
  while(n-- && i++<L){
  i= str.indexOf(pat, i);
  if (i < 0) break;
  }
  return i;
  }
  
  function countString(str, letter) {
  let count = 0;
  
  // looping through the items
  for (let i = 0; i < str.length; i++) {
  
  // check if the character is at that position
  if (str.charAt(i) == letter) {
  count += 1;
  }
  }
  return count;
  }
  

  function get_pat_pos(newstr){
  
  var count_pat = countString(newstr,'.');
  var list_pos = [];
  var cmp_num = [];
  var len_str = newstr.length
  
  var t_split = Math.floor(newstr.length/800);
  
  //alert (t_split);
  
  for (var j =1  ; j <t_split+1; j++) {
  cmp_num.push(800*j);
  
  }
  
  
  
  for (var k =cmp_num.length-1  ; k >-1; k--) {
  // console.log("k : ",cmp_num[k],k )
  for (var i = count_pat ; i >0; i--) {
  var get_sign  = nthIndex(newstr,'.',i);
  if (get_sign<cmp_num[k]){
  list_pos.push(get_sign);
  break;
  }
  
  
  }
  }
  
  
  return list_pos;
  }


  function replace_pos(myString,pos,character){
  myString = myString.substring(0,pos) +
  character +
  myString.substring(pos, myString.length);
  return myString;
  
  }

  async function get_clipboard_real() {
    // 1. 环境安全检查
    if (!navigator.clipboard) {
        console.error("当前环境不支持 Clipboard API (需 HTTPS)");
        return null;
    }

    try {
        // 2. 使用 await 等待 Promise 结果
        const text = await navigator.clipboard.readText();

        // 3. 逻辑处理：检查是否为空
        if (!text || text.trim() === '') {
            console.log("剪贴板内容为空");
            return '';
        }

        return text.trim(); 
    } catch (err) {
        // 4. 捕获异常（如用户拒绝权限、页面未聚焦等）
        console.error("读取剪贴板失败:", err);
        return null;
    }
}

function formatLongString(str) {
    if (str.length <= 3) return str; // 如果太短，没必要缩略

    const firstTwo = str.slice(0, 2);    // 获取前两个
    const lastOne = str.slice(-1);       // 获取最后一个
    
    return `${firstTwo}...${lastOne}`;
}

function formatLongString8_end(str) {
    if (str.length <= 3) return str; // 如果太短，没必要缩略

    const firstTwo = str.slice(0, 7);    // 获取前两个
    const lastOne = str.slice(-5);       // 获取最后一个
    
    return `${firstTwo}...${lastOne}`;
}

async function doCatStatusTask() {

    } catch (e) {
        console.error("cat_status 任务出错:", e);
    }
}

function startCatStatus() {
    if (intervalId) return; // 防止重复启动
    intervalId = setInterval(doCatStatusTask, 800); // 建议间隔 800ms 以上，更稳
}

function stopCatStatus() {
    if (intervalId) {
        clearInterval(intervalId);
        intervalId = null;
    }
}

const isWebView = () => {
  const ua = window.navigator.userAgent;
  const isAndroid = /Android/i.test(ua);
  const isIos = /iPhone|iPad|iPod/i.test(ua);

  if (isAndroid) {
    // Android WebView 通常包含 "wv"
    return /wv/i.test(ua) || /Version\/[\d.]+/i.test(ua);
  }
  
  if (isIos) {
    // iOS WebView 的特征是不包含 "Safari" 关键字，但包含 "AppleWebKit"
    return /AppleWebKit/i.test(ua) && !/Safari/i.test(ua);
  }

  return false;
};
