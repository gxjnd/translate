// html-tag-js@1.1.41 - 可读版（单个函数 + 扩展）
function tag(element, props = {}) {
// 如果第二个参数是字符串，自动转为 innerHTML
if (typeof props === "string") {
props = { innerHTML: props };
}

// 支持函数组件（高级用法）
if (typeof element === "function") {
return element(props, arguments[2]);
}

// 如果传入已有 DOM 节点，直接返回
if (element instanceof Node) {
return element;
}

// 必须是字符串标签名
if (typeof element !== "string") {
throw new Error(`Invalid tag: ${typeof element}`);
}

const el = document.createElement(element);

// 处理属性
Object.keys(props).forEach(key => {
let value = props[key];
if (value === undefined) return;

switch (key) {
case "child":
appendChild(el, value);
break;

case "children":
if (!Array.isArray(value)) {
throw new Error("children must be an array of Nodes");
}
value.flat().forEach(child => appendChild(el, child));
break;

case "attr":
Object.keys(value).forEach(attrKey => {
const attrVal = value[attrKey];
if (attrVal !== undefined) el.setAttribute(attrKey, attrVal);
});
break;

case "style":
case "dataset":
Object.keys(value).forEach(subKey => {
const subVal = value[subKey];
if (subVal !== undefined) el[key][subKey] = subVal;
});
break;

case "ref":
if (value && value.instanceOfRef) value.el = el;
break;

default:
el[key] = value;
}
});

return el;
}

// 辅助函数：追加子节点（支持字符串自动转文本）
function appendChild(parent, child) {
if (!(child instanceof Node)) {
child = document.createTextNode(String(child));
}
// 支持响应式文本节点（tag.use）的 clone
if (child instanceof Text && typeof child.clone === "function") {
child = child.clone();
}
parent.append(child);
}

// === 内置扩展方法（与官方完全一致）===
Object.defineProperties(tag, {
get: {
value: selector => document.querySelector(selector)
},
getAll: {
value: selector => Array.from(document.querySelectorAll(selector))
},
parse: {
value: html => {
const div = document.createElement("div");
div.innerHTML = html;
return div.childElementCount === 1
? div.firstElementChild
: Array.from(div.children);
}
},
text: {
value: str => document.createTextNode(str)
},
use: {
value: (initial = "") => {
let value = initial;
let isCloned = false;
const node = document.createTextNode(initial);
const clones = [node];

Object.defineProperty(node, "value", {
set: v => {
value = v;
clones.forEach(c => (c.textContent = v));
},
get: () => value
});

Object.defineProperty(node, "clone", {
value: () => {
if (!isCloned) {
isCloned = true;
return node;
}
const clone = node.cloneNode();
clones.push(clone);
return clone;
}
});

return node;
}
}
});

// 自动全局暴露（浏览器环境）
if (typeof window !== "undefined" && !window.tag) {
window.tag = tag;
}
</script>

        let paragraphs = [];

function processText(rawText) {
  // 将字符串按行拆分为数组（兼容 Windows 和 Unix 换行符）
  let lines = rawText.split(/\r?\n/);
  const totalLines = lines.length;
  
  // 插入的内容
  const separator = "\n\n--------------------------------------------------------------------------------- \n";
  const punctuation = ["。", "."];

  // 从第 20 行开始（索引为 19）
  let currentIndex = 19;

  while (currentIndex < totalLines) {
    let line = lines[currentIndex];
    let found = false;

    // 检查当前行是否包含定义的标点
    for (let p of punctuation) {
      if (line.includes(p)) {
        // 替换该行中所有的句号（如果只想替换第一个，去掉 /g）
        // 这里模拟 Python 的 replace，将标点替换为“标点+分割线”
        const regex = new RegExp(`\\${p}`, 'g'); 
        lines[currentIndex] = line.replace(regex, `${p}${separator}`);
        
        found = true;
        break; // 找到一种标点后跳出当前行的查找
      }
    }

    if (found) {
      // 如果处理了，向后跳转 20 行
      currentIndex += 20;
    } else {
      // 如果没找到，检查下一行
      currentIndex += 1;
    }
  }

  // 重新合并为字符串
  return lines.join('\n');
}

        function splitText(text) {

            currentIndex = 0;
            renderCurrent();

        function renderCurrent() {
            if (paragraphs.length === 0) return;
            
            document.getElementById('current-paragraph').innerHTML = 
                paragraphs[currentIndex].replace(/\n/g, '<br>');
            
            document.getElementById('current-num').textContent = currentIndex + 1;
            document.getElementById('total-num').textContent = paragraphs.length;
            document.getElementById('info-current').textContent = currentIndex + 1;
            document.getElementById('info-total').textContent = paragraphs.length;
        }

        function prevParagraph() {
            if (paragraphs.length === 0) return;
            currentIndex = (currentIndex - 1 + paragraphs.length) % paragraphs.length;
            renderCurrent();
        }

        function nextParagraph() {
            if (paragraphs.length === 0) return;
            currentIndex = (currentIndex + 1) % paragraphs.length;
            renderCurrent();
        }

        function copyCurrent() {
            if (paragraphs.length === 0) return;
            const text = paragraphs[currentIndex];
            navigator.clipboard.writeText(text).then(() => {
                const orig = event.target.textContent;
                event.target.textContent = '已複製！';
                setTimeout(() => {
                    event.target.textContent = orig;
                }, 1500);
            });
        }

            }).catch(() => {

            });
